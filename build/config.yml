version: '3'

info:
  companyName: "UberMorgott"
  productName: "Morgue"
  productIdentifier: "com.ubermorgott.morgue"
  description: "Binary decompiler orchestrator"
  copyright: "(c) 2025-2026, UberMorgott"
  version: "0.2.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: go build -tags dev -o bin/morgue-dev.exe ./cmd/morgue
      type: blocking
    - cmd: npx --prefix frontend vite --port 9245
      type: background
    - cmd: bin/morgue-dev.exe
      type: primary
